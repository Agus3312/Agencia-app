<div class="flex flex-col h-full overflow-y-auto items-center pt-2">
    <div class="p-8 w-full flex flex-col items-center">
        <!-- Header -->
        <header class="mb-8">
            <h1 class="text-3xl font-bold text-slate-900 dark:text-white tracking-tight">Crear Nuevo Proyecto</h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Define los parámetros clave para iniciar tu nueva iniciativa empresarial.</p>
        </header>

        <!-- Form Card -->
        <div class="max-w-3xl w-full">
            <div class="metric-card overflow-hidden">
                <form class="p-8 space-y-6" id="create-project-form">
                    
                    <!-- Section: Basic Info -->
                    <div class="grid grid-cols-1 gap-6">
                        <!-- Project Name -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="project-name">
                                Nombre del Proyecto
                            </label>
                            <input 
                                class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400" 
                                id="project-name" 
                                placeholder="Ej. Rediseño de Plataforma Q4" 
                                type="text"
                                required
                            />
                            <p class="text-xs text-slate-500">Máximo 100 caracteres</p>
                        </div>

                        <!-- Project Description -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="project-desc">
                                Descripción
                            </label>
                            <textarea 
                                class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-slate-400 resize-none" 
                                id="project-desc" 
                                placeholder="Describe los objetivos principales, el alcance y los resultados esperados..." 
                                rows="4"
                                required
                            ></textarea>
                            <p class="text-xs text-slate-500">Mínimo 20 caracteres</p>
                        </div>
                    </div>

                    <!-- Section: Leaders & Dates -->
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-slate-100 dark:border-slate-800">
                        <!-- Project Leader -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="project-leader">
                                Líder del Proyecto
                            </label>
                            <div class="relative">
                                <select 
                                    class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all appearance-none" 
                                    id="project-leader"
                                    required
                                >
                                    <option value="">Seleccionar miembro...</option>
                                    <option value="1">Sarah Jenkins - Tech Lead</option>
                                    <option value="2">Marcus Chen - UI Developer</option>
                                    <option value="3">Elena Rodriguez - Senior UX</option>
                                    <option value="4">David Kim - Junior Dev</option>
                                    <option value="5">Robert Sterling - Node.js Dev</option>
                                </select>
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-slate-400">
                                    <span class="material-symbols-outlined">expand_more</span>
                                </div>
                            </div>
                        </div>

                        <!-- Project Deadline -->
                        <div class="flex flex-col gap-2">
                            <label class="text-sm font-semibold text-slate-700 dark:text-slate-300" for="project-deadline">
                                Fecha Límite
                            </label>
                            <input 
                                class="w-full px-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-white dark:bg-slate-900 text-slate-900 dark:text-white focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all" 
                                id="project-deadline" 
                                type="date"
                                required
                            />
                        </div>
                    </div>

                    <!-- Section: Priority & Status -->
                    <div class="pt-4 border-t border-slate-100 dark:border-slate-800">
                        <label class="text-sm font-semibold text-slate-700 dark:text-slate-300 block mb-4">
                            Prioridad del Proyecto
                        </label>
                        <div class="flex flex-wrap gap-4">
                            <!-- Low Priority -->
                            <label class="flex-1 min-w-[120px] relative cursor-pointer">
                                <input class="peer sr-only" name="priority" type="radio" value="low"/>
                                <div class="p-4 border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-center">
                                    <div class="w-3 h-3 rounded-full bg-emerald-500 mx-auto mb-2"></div>
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Baja</span>
                                </div>
                            </label>

                            <!-- Medium Priority -->
                            <label class="flex-1 min-w-[120px] relative cursor-pointer">
                                <input checked class="peer sr-only" name="priority" type="radio" value="medium"/>
                                <div class="p-4 border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-center">
                                    <div class="w-3 h-3 rounded-full bg-amber-500 mx-auto mb-2"></div>
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Media</span>
                                </div>
                            </label>

                            <!-- High Priority -->
                            <label class="flex-1 min-w-[120px] relative cursor-pointer">
                                <input class="peer sr-only" name="priority" type="radio" value="high"/>
                                <div class="p-4 border border-slate-200 dark:border-slate-700 rounded-xl peer-checked:border-primary peer-checked:bg-primary/5 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all text-center">
                                    <div class="w-3 h-3 rounded-full bg-rose-500 mx-auto mb-2"></div>
                                    <span class="text-sm font-medium text-slate-700 dark:text-slate-300">Alta</span>
                                </div>
                            </label>
                        </div>
                    </div>

                    <!-- Footer Actions -->
                    <div class="pt-8 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between">
                        <button 
                            class="px-6 py-3 text-sm font-semibold text-slate-600 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors" 
                            type="button"
                            onclick="Router.goTo('dashboard')"
                        >
                            Cancelar
                        </button>
                        <button 
                            class="bg-primary hover:bg-primary/90 active:bg-primary/80 text-white px-10 py-3 rounded-lg font-bold shadow-lg shadow-primary/25 flex items-center gap-2 transition-all active:scale-95" 
                            type="submit"
                        >
                            <span class="material-symbols-outlined">rocket_launch</span>
                            Crear Proyecto
                        </button>
                    </div>
                </form>
            </div>

            <!-- Help Card -->
            <div class="mt-8 p-6 bg-primary/10 dark:bg-primary/5 rounded-xl border border-primary/20 flex items-center gap-4">
                <div class="w-12 h-12 rounded-full bg-white dark:bg-slate-900 flex items-center justify-center text-primary shadow-sm flex-shrink-0">
                    <span class="material-symbols-outlined">help</span>
                </div>
                <div class="flex-1">
                    <h4 class="text-sm font-bold text-slate-900 dark:text-white">¿Necesitas ayuda?</h4>
                    <p class="text-xs text-slate-600 dark:text-slate-400 mt-1">
                        Completa los campos obligatorios para crear un nuevo proyecto. Puedes editar los detalles más tarde.
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Form submission handler
document.getElementById('create-project-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const projectName = document.getElementById('project-name').value;
    const projectDesc = document.getElementById('project-desc').value;
    const projectLeader = document.getElementById('project-leader').value;
    const projectDeadline = document.getElementById('project-deadline').value;
    const priority = document.querySelector('input[name="priority"]:checked').value;
    
    // Validate inputs
    if (!projectName || !projectDesc || !projectLeader || !projectDeadline) {
        alert('Por favor, completa todos los campos obligatorios');
        return;
    }
    
    // Log form data (in a real app, send to server)
    console.log({
        name: projectName,
        description: projectDesc,
        leader: projectLeader,
        deadline: projectDeadline,
        priority: priority
    });
    
    // Show success message
    alert('¡Proyecto creado exitosamente!');
    
    // Redirect to projects page
    Router.goTo('dashboard');
});
</script>
