<div class="flex flex-col h-full overflow-y-auto w-full animate-enter">
    <!-- Header -->
    <header class="border-b border-slate-200 dark:border-slate-800 flex-shrink-0">
        <div class="px-8 py-6 flex items-center justify-between">
            <div>
                <h2 class="text-2xl font-bold flex items-center gap-3 relative">
                    <span class="material-symbols-outlined text-primary text-3xl">home_storage</span>
                    Mi Espacio Personal
                </h2>
                <p class="text-slate-500 dark:text-slate-400 mt-1 text-sm">Tu área privada para tareas, notas y organización.</p>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="px-8 pt-3 border-t border-slate-200 dark:border-slate-800 flex gap-6 mt-2">
            <button onclick="MySpacePage.loadTab('tasks')" id="tab-myspace-tasks" class="pb-4 border-b-2 border-primary text-primary font-semibold text-sm transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">task_alt</span> Mis Tareas
            </button>
            <button onclick="MySpacePage.loadTab('notes')" id="tab-myspace-notes" class="pb-4 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium text-sm transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">edit_document</span> Notas Privadas
            </button>
            <button onclick="MySpacePage.loadTab('security')" id="tab-myspace-security" class="pb-4 border-b-2 border-transparent text-slate-500 hover:text-slate-700 font-medium text-sm transition-all flex items-center gap-2">
                <span class="material-symbols-outlined text-[18px]">lock</span> Seguridad
            </button>
        </div>
    </header>

    <div class="flex-1 p-8 bg-slate-50 dark:bg-black/5" id="myspace-content">
        <!-- Tareas o Notas van acá -->
        <div class="flex items-center justify-center h-64">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary"></div>
        </div>
    </div>
</div>
