<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Team Management</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1d3faf",
                        "background-dark": "#0f172a",
                        "surface-dark": "#1e293b",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
    <!-- Include ApiAdapter -->
    <script src="../js/utils/ApiAdapter.js"></script>
</head>

<body
    class="bg-gray-50 dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

    <div
        class="w-full max-w-sm bg-white dark:bg-surface-dark rounded-2xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-800">
        <div class="p-8">
            <div class="flex justify-center mb-8">
                <div
                    class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-500/30">
                    <span class="material-symbols-outlined text-2xl">group_work</span>
                </div>
            </div>

            <h2 class="text-2xl font-bold text-center mb-2">Bienvenido</h2>
            <p class="text-slate-500 dark:text-slate-400 text-center text-sm mb-8">Ingresa tus credenciales para acceder
            </p>

            <!-- Error message -->
            <div id="login-error" class="hidden mb-4 p-3 rounded-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800 text-red-600 dark:text-red-400 text-sm text-center"></div>

            <form id="login-form" class="space-y-4">
                <div>
                    <label
                        class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-1.5 ml-1">Email</label>
                    <input type="email" id="email" value="admin@acme.com" required
                        class="w-full bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white">
                </div>

                <div>
                    <label
                        class="block text-xs font-bold uppercase text-slate-500 dark:text-slate-400 mb-1.5 ml-1">Contraseña</label>
                    <input type="password" id="password" value="123456" required
                        class="w-full bg-slate-50 dark:bg-black/20 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-2.5 text-sm focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all dark:text-white">
                </div>

                <button type="submit" id="login-btn"
                    class="w-full bg-primary hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-lg shadow-blue-500/25 mt-2 flex items-center justify-center gap-2">
                    <span id="login-text">Iniciar Sesión</span>
                    <svg id="login-spinner" class="hidden animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-6 text-center">
                <a href="#" class="text-xs text-primary hover:underline">¿Olvidaste tu contraseña?</a>
            </div>
        </div>
        <div class="px-8 py-4 bg-slate-50 dark:bg-black/20 border-t border-slate-100 dark:border-slate-800 text-center">
            <p class="text-xs text-slate-400">© 2024 Acme Corp Management</p>
        </div>
    </div>

    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('login-error');
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('login-text');
            const spinner = document.getElementById('login-spinner');

            // Reset error
            errorDiv.classList.add('hidden');

            // Show loading
            btn.disabled = true;
            btnText.textContent = 'Ingresando...';
            spinner.classList.remove('hidden');

            try {
                const data = await ApiAdapter.post('/api/auth/login', { email, password });

                // Store JWT token
                localStorage.setItem('auth_token', data.token);

                // Cache user data
                localStorage.setItem('auth_user', JSON.stringify(data.user));

                // Redirect to app
                window.location.href = '../index.html';
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Iniciar Sesión';
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>

</html>
